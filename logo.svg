<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">
  <defs>
    <filter id="x-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur1"/>
      <feGaussianBlur stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="o-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur1"/>
      <feGaussianBlur stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grid-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="120" height="120" fill="#1a1a2e" rx="16"/>

  <!-- Board border glow -->
  <rect x="16" y="16" width="88" height="88" fill="none" stroke="#0f3460" stroke-width="4" rx="6" filter="url(#grid-glow)"/>
  <rect x="18" y="18" width="84" height="84" fill="none" stroke="#16213e" stroke-width="2" rx="4"/>

  <!-- Grid lines -->
  <g filter="url(#grid-glow)">
    <rect x="50" y="26" width="4" height="68" fill="#0f3460" rx="1"/>
    <rect x="74" y="26" width="4" height="68" fill="#0f3460" rx="1"/>
    <rect x="26" y="50" width="68" height="4" fill="#0f3460" rx="1"/>
    <rect x="26" y="74" width="68" height="4" fill="#0f3460" rx="1"/>
  </g>

  <!-- X in top-left cell -->
  <g filter="url(#x-glow)" fill="#e94560">
    <rect x="30" y="30" width="6" height="6"/>
    <rect x="38" y="38" width="6" height="6"/>
    <rect x="30" y="38" width="6" height="6"/>
    <rect x="38" y="30" width="6" height="6"/>
  </g>

  <!-- O in center cell -->
  <g filter="url(#o-glow)">
    <rect x="58" y="54" width="4" height="4" fill="#00d9ff"/>
    <rect x="62" y="54" width="4" height="4" fill="#00d9ff"/>
    <rect x="54" y="58" width="4" height="4" fill="#00d9ff"/>
    <rect x="66" y="58" width="4" height="4" fill="#00d9ff"/>
    <rect x="58" y="66" width="4" height="4" fill="#00d9ff"/>
    <rect x="62" y="66" width="4" height="4" fill="#00d9ff"/>
    <rect x="54" y="62" width="4" height="4" fill="#00d9ff"/>
    <rect x="66" y="62" width="4" height="4" fill="#00d9ff"/>
    <rect x="58" y="58" width="8" height="8" fill="#1a1a2e" rx="1"/>
  </g>

  <!-- Subtle corner accents -->
  <g fill="#ffd700" opacity="0.4">
    <rect x="22" y="22" width="4" height="4"/>
    <rect x="94" y="22" width="4" height="4"/>
    <rect x="22" y="94" width="4" height="4"/>
    <rect x="94" y="94" width="4" height="4"/>
  </g>
</svg>
